worker_processes  1;
pid /tmp/nginx-jinengjiaoyi.pid;
error_log /tmp/nginx-jinengjiaoyi-error.log;

events {
    worker_connections  1024;
}

http {
    include       /opt/homebrew/etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 100m;
    access_log /tmp/nginx-jinengjiaoyi-access.log;
    client_body_temp_path /tmp/nginx-jinengjiaoyi-body;
    proxy_temp_path /tmp/nginx-jinengjiaoyi-proxy;
    fastcgi_temp_path /tmp/nginx-jinengjiaoyi-fastcgi;
    uwsgi_temp_path /tmp/nginx-jinengjiaoyi-uwsgi;
    scgi_temp_path /tmp/nginx-jinengjiaoyi-scgi;

    server {
        listen 8081;
        server_name localhost;

        # ===== 管理端前端（路径 /admin/）=====
        location /admin/ {
            alias /Users/hanjiaxin/Desktop/jinengjiaoyi/jinengjiaoyi-admin/dist/;
            index index.html;
            try_files $uri $uri/ /admin/index.html;
        }

        # ===== 后端 API 反向代理 =====
        location ~ ^/(chat|chathelper|chatmessage|config|discussjinengxuqiu|discussxuexiziliao|file|forum|forumtype|friend|huiyuanchongzhi|jiaohuanjilu|jiaohuanshenqing|jinengfenlei|jinengxuqiu|messages|news|newstype|pingjiafankui|sensitivewords|storeup|syslog|users|xuexiziliao|yonghu|ziliaogoumai|ziliaoleixing|commoncontroller)(/|$) {
            proxy_pass http://127.0.0.1:48081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket 代理
        location /websocket {
            proxy_pass http://127.0.0.1:48081/websocket;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # ===== 用户端前端（默认路径 /）=====
        location / {
            root /Users/hanjiaxin/Desktop/jinengjiaoyi/jinengjiaoyi-user/dist;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
